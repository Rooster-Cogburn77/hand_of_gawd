<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>hand_of_gawd safe toggle fixture</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        background: #f5f7fa;
        color: #111827;
      }

      main {
        padding: 80px 96px;
      }

      h1 {
        margin: 0 0 32px;
        font-size: 32px;
        font-weight: 700;
      }

      #state {
        margin-bottom: 28px;
        font-size: 40px;
        font-weight: 700;
      }

      #arm-button {
        width: 180px;
        height: 72px;
        border: 0;
        border-radius: 6px;
        background: #2563eb;
        color: white;
        font-size: 28px;
        font-weight: 700;
        cursor: pointer;
      }

      #arm-button[aria-pressed="true"] {
        background: #047857;
      }

      form {
        margin-top: 48px;
      }

      #approval-state {
        margin-bottom: 16px;
        font-size: 28px;
        font-weight: 700;
      }

      #submit-button {
        width: 220px;
        height: 64px;
        border: 0;
        border-radius: 6px;
        background: #7c2d12;
        color: white;
        font-size: 24px;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body data-state="safe">
    <main>
      <h1>Synthetic Safe Toggle</h1>
      <div id="state" role="status" aria-live="polite">SAFE</div>
      <button
        id="arm-button"
        type="button"
        aria-label="Arm fixture"
        aria-pressed="false"
        onclick="document.body.dataset.state='armed'; document.getElementById('state').textContent='ARMED'; this.textContent='Armed'; this.setAttribute('aria-pressed', 'true');"
      >Arm</button>
      <form
        id="approval-form"
        action="/submitted"
        method="post"
        onsubmit="event.preventDefault(); document.body.dataset.submission='submitted'; document.getElementById('approval-state').textContent='SUBMITTED';"
      >
        <div id="approval-state" role="status" aria-live="polite">DRAFT</div>
        <button id="submit-button" type="submit" aria-label="Submit fixture">Submit</button>
      </form>
    </main>
  </body>
</html>
